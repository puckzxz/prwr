name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - 20
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Smoke CLI help
        if: runner.os == 'Windows'
        run: node dist/cli.js --help

      - name: Smoke CLI status failure
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = node dist/cli.js status 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Expected prwr status to fail when no supervisor is running."
          }
          if ($output -notmatch "prwr supervisor is not running") {
            Write-Error "Unexpected status output: $output"
          }
